<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png" />
    <title>VirtualDesktopz — Search</title>
    <link rel="stylesheet" href="./css/master.css" />
    <script src="/uv/uv.bundle.js" charset="UTF-8"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="./js/preload.js"></script>
    <script src="./js/auth.js"></script>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { background: #000 !important; color: #fff; font-family: 'Syne', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
      #vd-bg-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.55; }
      #vd-bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 48px 48px; }
      #vd-bg-vignette { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.88) 90%); }
      body > *:not(#vd-bg-canvas):not(#vd-bg-grid):not(#vd-bg-vignette):not(#vd-auth-overlay):not(#vd-devtools-wall) { position: relative; z-index: 1; }

      nav { background: rgba(0,0,0,0.65) !important; backdrop-filter: blur(24px) !important; -webkit-backdrop-filter: blur(24px) !important; border-bottom: 1px solid rgba(255,255,255,0.07) !important; display: flex; align-items: center; padding: 0 24px; height: 58px; gap: 20px; }
      nav .logo { display: flex; align-items: center; gap: 10px; }
      nav .logo img { width: 26px; height: 26px; border-radius: 7px; }
      nav .logo h1 { color: #fff !important; font-size: 15px !important; font-weight: 800 !important; margin: 0; }
      nav #time { font-family: 'JetBrains Mono', monospace; color: rgba(255,255,255,0.28); font-size: 12px; margin: 0; margin-left: auto; }
      nav .navitems { display: flex; align-items: center; gap: 2px; }
      nav .navitem a { color: rgba(255,255,255,0.45) !important; text-decoration: none !important; font-family: 'Syne', sans-serif !important; font-weight: 600 !important; font-size: 13px !important; padding: 7px 14px !important; border-radius: 9px !important; transition: color 0.18s, background 0.18s !important; background: transparent !important; display: block !important; }
      nav .navitem a:hover { color: #fff !important; background: rgba(255,255,255,0.08) !important; }
      nav .navitem a[selected] { color: #000 !important; background: #fff !important; font-weight: 700 !important; box-shadow: 0 0 20px rgba(255,255,255,0.18) !important; }

      .search-hero {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 60px 24px 32px;
        animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        animation-delay: 0.05s;
      }
      .search-hero h1 {
        font-size: clamp(36px,5vw,56px); font-weight: 800;
        letter-spacing: -0.04em; color: #fff; margin: 0 0 28px;
        text-shadow: 0 0 50px rgba(255,255,255,0.1);
      }
      .pxyinput {
        width: min(540px, 90%);
        padding: 16px 24px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 14px; color: #fff;
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px; letter-spacing: 0.03em;
        outline: none; display: block;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      }
      .pxyinput::placeholder { color: rgba(255,255,255,0.2); }
      .pxyinput:focus { border-color: rgba(255,255,255,0.32); background: rgba(255,255,255,0.08); box-shadow: 0 0 28px rgba(255,255,255,0.06); }

      .frame {
        display: block; width: calc(100% - 48px);
        max-width: 1100px; margin: 0 auto 24px;
        height: calc(100vh - 200px); min-height: 400px;
        border: 1px solid rgba(255,255,255,0.07) !important;
        border-radius: 16px;
        box-shadow: 0 0 40px rgba(255,255,255,0.03), 0 24px 64px rgba(0,0,0,0.6);
      }
      .frame[src=""] { display: none; }

      @keyframes fadeUp { from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);} }
      ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:99px;}
      * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent; }
    </style>
  </head>
  <body theme="main">
    <canvas id="vd-bg-canvas"></canvas>
    <div id="vd-bg-grid"></div>
    <div id="vd-bg-vignette"></div>

    <nav>
      <div class="logo">
        <img src="./assets/images/icon.png" alt="Logo" draggable="false" />
        <h1>VirtualDesktopz</h1>
      </div>
      <p id="time"></p>
      <div class="navitems">
        <div class="navitem"><a href="/index.html">Home</a></div>
        <div class="navitem"><a href="/gs.html">Games</a></div>
        <div class="navitem"><a href="/apps.html">Apps</a></div>
        <div class="navitem"><a href="/emulator.html">Emulator</a></div>
        <div class="navitem"><a selected href="/search.html">Search</a></div>
      </div>
    </nav>

    <div class="search-hero">
      <h1>Search</h1>
      <input class="pxyinput" type="text" placeholder="Enter a URL or search term…" />
    </div>
    <iframe class="frame" src=""></iframe>

    <script src="./js/index.js"></script>
    <script src="./js/search.js"></script>
    <script type="text/javascript"> aclib.runAutoTag({ zoneId: '6hmeyutild' }); </script>
    <script>
    (function(){var canvas=document.getElementById('vd-bg-canvas'),ctx=canvas.getContext('2d'),W=canvas.width=window.innerWidth,H=canvas.height=window.innerHeight;window.addEventListener('resize',function(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;});var p=Array.from({length:60},function(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.3,dx:(Math.random()-0.5)*0.22,dy:(Math.random()-0.5)*0.22,alpha:Math.random()*0.35+0.05};});function draw(){ctx.clearRect(0,0,W,H);p.forEach(function(q){ctx.beginPath();ctx.arc(q.x,q.y,q.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+q.alpha+')';ctx.fill();q.x+=q.dx;q.y+=q.dy;if(q.x<0||q.x>W)q.dx*=-1;if(q.y<0||q.y>H)q.dy*=-1;});for(var i=0;i<p.length;i++)for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<110){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle='rgba(255,255,255,'+(0.07*(1-dist/110))+')';ctx.lineWidth=0.7;ctx.stroke();}}requestAnimationFrame(draw);}draw();})();
    </script>
  </body>
</html>
