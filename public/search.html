<!DOCTYPE html>
<html>
  <head>
    <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png" />
    <title>VirtualDesktopz</title>
    <link rel="stylesheet" href="./css/master.css" />
    <script src="/uv/uv.bundle.js" charset="UTF-8"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="./js/preload.js"></script>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        background: #000 !important;
        color: #fff;
        font-family: 'Syne', sans-serif;
      }

      #vd-bg-canvas {
        position: fixed; inset: 0;
        width: 100%; height: 100%;
        z-index: 0; pointer-events: none; opacity: 0.55;
      }
      #vd-bg-grid {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 48px 48px;
      }
      #vd-bg-vignette {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.85) 90%);
      }
      body > *:not(#vd-bg-canvas):not(#vd-bg-grid):not(#vd-bg-vignette) {
        position: relative; z-index: 1;
      }

      .center-container {
        animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        animation-delay: 0.05s;
      }

      .center-container h1 {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #fff;
        text-shadow: 0 0 40px rgba(255,255,255,0.18);
        margin-bottom: 24px;
      }

      .pxyinput {
        width: min(520px, 90%);
        padding: 16px 22px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 14px;
        color: #fff;
        font-family: 'JetBrains Mono', monospace;
        font-size: 15px;
        letter-spacing: 0.03em;
        outline: none;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        display: block;
        margin: 0 auto;
      }
      .pxyinput::placeholder { color: rgba(255,255,255,0.2); }
      .pxyinput:focus {
        border-color: rgba(255,255,255,0.32);
        background: rgba(255,255,255,0.08);
        box-shadow: 0 0 28px rgba(255,255,255,0.06);
      }

      .frame {
        border: 1px solid rgba(255,255,255,0.07) !important;
        border-radius: 14px;
        box-shadow: 0 0 40px rgba(255,255,255,0.03), 0 20px 60px rgba(0,0,0,0.5);
        margin-top: 20px;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body theme="main">
    <canvas id="vd-bg-canvas"></canvas>
    <div id="vd-bg-grid"></div>
    <div id="vd-bg-vignette"></div>

    <nav>
      <div class="logo">
        <img src="./assets/images/icon.png" alt="Logo" draggable="false" />
        <h1>VirtualDesktopz</h1>
      </div>
      <p id="time"></p>
      <div class="navitems">
        <div class="navitem"><a href="/index.html">Home</a></div>
        <div class="navitem"><a href="/gs.html">Games</a></div>
        <div class="navitem"><a href="/apps.html">Apps</a></div>
        <div class="navitem"><a href="/emulator.html">Emulator</a></div>
        <div class="navitem"><a selected href="/search.html">Search</a></div>
      </div>
    </nav>

    <div class="center-container">
      <h1>Search</h1>
      <input class="pxyinput" type="text" placeholder="Search..." />
    </div>
    <iframe class="frame"></iframe>

    <script src="./js/index.js"></script>
    <script src="./js/search.js"></script>

    <script type="text/javascript">
      aclib.runAutoTag({ zoneId: '6hmeyutild' });
    </script>

    <script>
    (function() {
      const canvas = document.getElementById('vd-bg-canvas');
      const ctx = canvas.getContext('2d');
      let W = canvas.width = window.innerWidth;
      let H = canvas.height = window.innerHeight;
      window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
      const particles = Array.from({ length: 60 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.4 + 0.3,
        dx: (Math.random() - 0.5) * 0.22, dy: (Math.random() - 0.5) * 0.22,
        alpha: Math.random() * 0.35 + 0.05
      }));
      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.alpha})`; ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0 || p.x > W) p.dx *= -1;
          if (p.y < 0 || p.y > H) p.dy *= -1;
        });
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 110) {
              ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(255,255,255,${0.07*(1-dist/110)})`; ctx.lineWidth = 0.7; ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();
    </script>
  </body>
</html>
