    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      #password-overlay {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        overflow: hidden;
        font-family: 'Syne', sans-serif;
        isolation: isolate;
      }

      #pw-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.7;
      }

      #pw-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      #pw-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 20%, #000 85%);
      }

      #pw-card {
        position: relative;
        z-index: 2;
        width: 420px;
        padding: 52px 48px 44px;
        background: rgba(10, 10, 10, 0.88);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow:
          0 0 0 1px rgba(255,255,255,0.05),
          0 32px 80px rgba(0,0,0,0.9),
          0 0 60px rgba(255,255,255,0.03);
        text-align: center;
        animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
      }

      @keyframes cardIn {
        from { opacity: 0; transform: translateY(28px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      #pw-card::before {
        content: '';
        position: absolute;
        top: 0; left: 50%;
        transform: translateX(-50%);
        width: 55%;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      }

      #pw-logo-wrap {
        position: relative;
        width: 96px;
        height: 96px;
        margin: 0 auto 28px;
      }

      #pw-logo-ring {
        position: absolute;
        inset: -9px;
        border-radius: 50%;
        border: 1.5px solid transparent;
        background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.05), rgba(255,255,255,0.6)) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        animation: ringRotate 5s linear infinite;
      }

      #pw-logo-ring-outer {
        position: absolute;
        inset: -18px;
        border-radius: 50%;
        border: 1px solid transparent;
        background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0), rgba(255,255,255,0.15)) border-box;
        -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        animation: ringRotate 10s linear infinite reverse;
      }

      @keyframes ringRotate {
        to { transform: rotate(360deg); }
      }

      #logo {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        object-position: center;
        position: relative;
        z-index: 1;
        display: block;
        box-shadow: 0 0 0 2px rgba(255,255,255,0.08), 0 0 24px rgba(255,255,255,0.06);
      }

      #pw-eyebrow {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        font-weight: 400;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
        margin-bottom: 10px;
      }

      #pw-title {
        font-size: 26px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
        line-height: 1.1;
        text-shadow: 0 0 30px rgba(255,255,255,0.2);

      #pw-subtitle {

        color: rgba(255,255,255,0.25);

        letter-spacing: 0.01em;
      }

      #pw-input-wrap {
        position: relative;

      }

      #pw-input-wrap::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 13px;
        padding: 1px;
        background: linear-gradient(135deg, rgba(255,255,255,0), rgba(255,255,255,0.5), rgba(255,255,255,0));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: destination-out;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }

      #pw-input-wrap.focused::before {
        opacity: 1;
      }

      #pw-lock-icon {

        left: 16px;

        transform: translateY(-50%);
        color: rgba(255,255,255,0.18);
        transition: color 0.3s;
        pointer-events: none;
        display: flex;
        align-items: center;
      }

      #pw-input-wrap.focused #pw-lock-icon {
        color: rgba(255,255,255,0.7);
      }

      #pw-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: rgba(255,255,255,0.18);

      #password-input {

        border-radius: 12px;

        outline: none;
        letter-spacing: 0.08em;
        transition: background 0.2s, border-color 0.2s;
      }

      #password-input::placeholder {
        color: rgba(255,255,255,0.16);
        letter-spacing: 0.05em;
      }

      #password-input:focus {
        background: rgba(255,255,255,0.07);
        border-color: rgba(255,255,255,0.22);
      }

      #pw-submit {
        width: 100%;
        padding: 15px;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 12px;
        cursor: pointer;
        font-family: 'Syne', sans-serif;

        font-weight: 700;

        text-transform: uppercase;
        color: #000;
        background: #fff;

        content: '';

      .pw-dot.filled {

  <script>
    const CORRECT_PASSWORD = "serenittypremium";

    const overlay = document.getElementById('password-overlay');
    const input = document.getElementById('password-input');
    const errorMsg = document.getElementById('error-msg');
    const card = document.getElementById('pw-card');
    const submitBtn = document.getElementById('pw-submit');
    const inputWrap = document.getElementById('pw-input-wrap');
    const dots = document.querySelectorAll('.pw-dot');
    const toggleBtn = document.getElementById('pw-toggle');
    const eyeIcon = document.getElementById('eye-icon');

    const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
    const eyeClosed = `<line x1="17.94" y1="17.94" x2="23" y2="23"></line><line x1="1" y1="1" x2="6.06" y2="6.06"></line><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="12" x2="4.06" y2="12"></line>`;

    toggleBtn.addEventListener('click', () => {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      eyeIcon.innerHTML = isPassword ? eyeClosed : eyeOpen;
      input.focus();
    });

    input.addEventListener('input', () => {
      const len = Math.min(input.value.length, dots.length);
      dots.forEach((d, i) => d.classList.toggle('filled', i < len));
    });

    input.addEventListener('focus', () => inputWrap.classList.add('focused'));
    input.addEventListener('blur', () => inputWrap.classList.remove('focused'));

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      card.classList.add('shake');
      card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
      setTimeout(() => { errorMsg.classList.remove('visible'); }, 2200);
    }

    function checkPassword() {
      if (!input.value) return;
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'Verifying...';

      setTimeout(() => {
        if (input.value === CORRECT_PASSWORD) {
          submitBtn.textContent = '✓ Unlocked';
          overlay.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
          overlay.style.transform = 'scale(1.04)';
          overlay.style.opacity = '0';
          setTimeout(() => { overlay.style.display = 'none'; }, 620);
        } else {
          submitBtn.classList.remove('loading');
          submitBtn.textContent = 'Unlock';
          showError('Incorrect password — try again');
          input.value = '';
          dots.forEach(d => d.classList.remove('filled'));
          input.focus();
        }
      }, 550);
    }

    submitBtn.addEventListener('click', checkPassword);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });

    window.addEventListener('load', () => { input.focus(); startParticles(); });

    function startParticles() {
      const canvas = document.getElementById('pw-canvas');
      const ctx = canvas.getContext('2d');
      let W = canvas.width = window.innerWidth;
      let H = canvas.height = window.innerHeight;

      window.addEventListener('resize', () => {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      });

      const particles = Array.from({ length: 55 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        dx: (Math.random() - 0.5) * 0.25,
        dy: (Math.random() - 0.5) * 0.25,
        alpha: Math.random() * 0.4 + 0.05
      }));

      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
          ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0 || p.x > W) p.dx *= -1;
          if (p.y < 0 || p.y > H) p.dy *= -1;
        });

        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(255,255,255,${0.08 * (1 - dist / 120)})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    }
  </script>

  <script>
    (function() {
      const segments = [
        'dashboard','portal','cdn','static','assets','api','v2','v3','auth',
        'session','user','profile','content','media','secure','gateway','proxy',
        'service','resource','data','storage','cache','stream','hub','node',
        'client','server','connect','network','core','module','engine','runtime',
        'sandbox','iframe','frame','embed','worker','script','loader','bundle',
        'chunk','vendor','lib','util','helper','component','layout','view',
        'render','output','result','response','request','query','index','main'
      ];

      const extensions = [
        '', '', '',
        '.js', '.json', '.html', '.css', '.map', '.wasm', '.ts'
      ];

      const hosts = [
        'accounts.google.com',
        'classroom.google.com',
        'docs.google.com',
        'drive.google.com',
        'mail.google.com',
        'meet.google.com',
        'canvas.instructure.com',
        'outlook.office.com',
        'teams.microsoft.com',
        'web.microsoftstream.com',
        'clever.com',
        'kahoot.it',
        'quizlet.com',
        'wikipedia.org',
        'khanacademy.org',
        'duolingo.com',
        'schoology.com',
        'ed.link',
        'pearson.com',
        'mheducation.com'
      ];

      const protocols = ['https://', 'https://'];

      function rand(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function randToken(len) {
        const chars = 'abcdef0123456789';
        let out = '';
        for (let i = 0; i < len; i++) out += chars[Math.floor(Math.random() * chars.length)];
        return out;
      }

      function generateFakePath() {
        const depth = randInt(1, 4);
        let path = '/';
        for (let i = 0; i < depth; i++) {
          const useToken = Math.random() < 0.25;
          path += useToken ? randToken(randInt(8, 16)) : rand(segments);
          if (i < depth - 1) path += '/';
        }
        path += rand(extensions);

        if (Math.random() < 0.35) {
          const paramKeys = ['id','token','ref','session','v','t','src','from','redirect','code','state','nonce'];
          const numParams = randInt(1, 3);
          const params = [];
          for (let i = 0; i < numParams; i++) {
            params.push(rand(paramKeys) + '=' + randToken(randInt(6, 20)));
          }
          path += '?' + params.join('&');
        }

        if (Math.random() < 0.15) {
          path += '#' + rand(segments);
        }

        return path;
      }

      function generateFakeURL() {
        return protocols[0] + rand(hosts) + generateFakePath();
      }

      function rotateURL() {
        try {
          const fakeURL = generateFakeURL();
          const fakeTitle = fakeURL;
          const path = fakeURL.replace(/^https?:\/\/[^/]+/, '') || '/';
          history.replaceState(null, fakeTitle, path);
          document.title = fakeURL;
        } catch(e) {}
      }

      setInterval(rotateURL, 200);
    })();
  </script>
