<!DOCTYPE html>
<html>
  <head>
    <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png" />
    <title>VirtualDesktopz</title>
    <link rel="stylesheet" href="./css/master.css" />
    <script src="/uv/uv.bundle.js" charset="UTF-8"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="./js/preload.js"></script>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        background: #000 !important;
        color: #fff;
        font-family: 'Syne', sans-serif;
      }

      #vd-bg-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
        opacity: 0.55;
      }

      #vd-bg-grid {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      #vd-bg-vignette {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.85) 90%);
      }

      body > *:not(#vd-bg-canvas):not(#vd-bg-grid):not(#vd-bg-vignette) {
        position: relative;
        z-index: 1;
      }

      .center-container {
        animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        animation-delay: 0.1s;
      }

      .center-container h1 {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #fff;
        text-shadow: 0 0 40px rgba(255,255,255,0.18);
        margin-bottom: 18px;
      }

      #splash {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        color: rgba(255,255,255,0.45);
        letter-spacing: 0.04em;
        line-height: 1.7;
        max-width: 480px;
        margin: 0 auto;
      }

      .button.play {
        margin-top: 28px;
        padding: 14px 36px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 12px;
        font-family: 'Syne', sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: transform 0.15s, box-shadow 0.2s;
        box-shadow: 0 0 24px rgba(255,255,255,0.12), 0 4px 20px rgba(0,0,0,0.4);
      }

      .button.play::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
        transform: skewX(-20deg);
        transition: left 0.5s;
      }

      .button.play:hover::before { left: 160%; }
      .button.play:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 40px rgba(255,255,255,0.2), 0 8px 28px rgba(0,0,0,0.5);
      }
      .button.play:active { transform: translateY(0); }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
      * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.25) transparent; }

      nav {
        background: rgba(0,0,0,0.6) !important;
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
        border-bottom: 1px solid rgba(255,255,255,0.07) !important;
      }

      nav .logo h1 {
        color: #fff !important;
        font-size: 15px !important;
        font-weight: 800 !important;
      }

      nav .logo img {
        border-radius: 6px !important;
      }

      nav #time {
        font-family: 'JetBrains Mono', monospace !important;
        color: rgba(255,255,255,0.3) !important;
        font-size: 12px !important;
      }

      nav .navitem a {
        color: rgba(255,255,255,0.45) !important;
        text-decoration: none !important;
        font-family: 'Syne', sans-serif !important;
        font-weight: 600 !important;
        font-size: 13px !important;
        padding: 6px 13px !important;
        border-radius: 8px !important;
        transition: color 0.18s, background 0.18s !important;
        background: transparent !important;
        display: block !important;
      }

      nav .navitem a:hover {
        color: #fff !important;
        background: rgba(255,255,255,0.08) !important;
      }

      nav .navitem a[selected] {
        color: #000 !important;
        background: #fff !important;
        font-weight: 700 !important;
        box-shadow: 0 0 18px rgba(255,255,255,0.2) !important;
      }

    
      .center-container {
        position: static !important;
        left: auto !important;
        right: auto !important;
        top: auto !important;
        bottom: auto !important;
        transform: none !important;
        margin: 0 auto !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: calc(100vh - 60px) !important;
        text-align: center !important;
        padding: 40px 24px !important;
        width: 100% !important;
        max-width: 100% !important;
      }

    </style>
  </head>
  <body theme="main">
    <canvas id="vd-bg-canvas"></canvas>
    <div id="vd-bg-grid"></div>
    <div id="vd-bg-vignette"></div>

    <nav>
      <div class="logo">
        <img src="./assets/images/icon.png" alt="Logo" draggable="false" />
        <h1>VirtualDesktopz</h1>
      </div>
      <p id="time"></p>
      <div class="navitems">
        <div class="navitem"><a href="/">Home</a></div>
        <div class="navitem"><a href="/gs.html">Games</a></div>
        <div class="navitem"><a href="/apps.html">Apps</a></div>
        <div class="navitem"><a href="/emulator.html">Emulator</a></div>
        <div class="navitem"><a href="/search.html">Search</a></div>
      </div>
    </nav>

    <div class="center-container">
      <h1>VirtualDesktopz</h1>
      <p id="splash">q</p>
      <br />
      <button onclick="window.location.href='/index.html'" class="button play">
        Done reading?
      </button>
    </div>

    <script src="./js/index.js"></script>
    <script type="text/javascript">
      aclib.runAutoTag({ zoneId: '6hmeyutild' });
    </script>

    <script>
    (function() {
      const canvas = document.getElementById('vd-bg-canvas');
      const ctx = canvas.getContext('2d');
      let W = canvas.width = window.innerWidth;
      let H = canvas.height = window.innerHeight;
      window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
      const particles = Array.from({ length: 60 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.4 + 0.3,
        dx: (Math.random() - 0.5) * 0.22, dy: (Math.random() - 0.5) * 0.22,
        alpha: Math.random() * 0.35 + 0.05
      }));
      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.alpha})`; ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0 || p.x > W) p.dx *= -1;
          if (p.y < 0 || p.y > H) p.dy *= -1;
        });
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 110) {
              ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(255,255,255,${0.07*(1-dist/110)})`; ctx.lineWidth = 0.7; ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();
    </script>
  </body>
</html>
