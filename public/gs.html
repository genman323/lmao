<!DOCTYPE html>
<html>
  <head>
    <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png" />
    <title>VirtualDesktopz</title>
    <link rel="stylesheet" href="./css/master.css" />
    <script src="/uv/uv.bundle.js" charset="UTF-8"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="./js/preload.js"></script>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        background: #000 !important;
        color: #fff;
        font-family: 'Syne', sans-serif;
      }

      #vd-bg-canvas {
        position: fixed; inset: 0;
        width: 100%; height: 100%;
        z-index: 0; pointer-events: none; opacity: 0.55;
      }
      #vd-bg-grid {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 48px 48px;
      }
      #vd-bg-vignette {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.85) 90%);
      }
      body > *:not(#vd-bg-canvas):not(#vd-bg-grid):not(#vd-bg-vignette) {
        position: relative; z-index: 1;
      }

      h1 {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #fff;
        text-shadow: 0 0 40px rgba(255,255,255,0.15);
        text-align: center;
        margin: 32px 0 18px;
        animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
      }

      .input {
        display: block;
        margin: 0 auto 28px;
        padding: 13px 20px;
        width: min(400px, 90%);
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        color: #fff;
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        letter-spacing: 0.04em;
        outline: none;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
        animation-delay: 0.08s;
      }
      .input::placeholder { color: rgba(255,255,255,0.2); }
      .input:focus {
        border-color: rgba(255,255,255,0.3);
        background: rgba(255,255,255,0.08);
        box-shadow: 0 0 20px rgba(255,255,255,0.05);
      }

      .cardgroup {
        animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
        animation-delay: 0.14s;
      }

      .card {
        background: rgba(255,255,255,0.04) !important;
        border: 1px solid rgba(255,255,255,0.08) !important;
        border-radius: 14px !important;
        transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s !important;
      }
      .card:hover {
        transform: translateY(-3px) !important;
        border-color: rgba(255,255,255,0.18) !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.04) !important;
      }

      button.secondary {
        display: block;
        margin: 24px auto;
        padding: 11px 28px;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 10px;
        color: rgba(255,255,255,0.5);
        font-family: 'Syne', sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s;
      }
      button.secondary:hover {
        border-color: rgba(255,255,255,0.35);
        color: rgba(255,255,255,0.9);
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
      * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.25) transparent; }

      nav {
        background: rgba(0,0,0,0.6) !important;
        backdrop-filter: blur(20px) !important;
        -webkit-backdrop-filter: blur(20px) !important;
        border-bottom: 1px solid rgba(255,255,255,0.07) !important;
      }

      nav .logo h1 {
        color: #fff !important;
        font-size: 15px !important;
        font-weight: 800 !important;
      }

      nav .logo img {
        border-radius: 6px !important;
      }

      nav #time {
        font-family: 'JetBrains Mono', monospace !important;
        color: rgba(255,255,255,0.3) !important;
        font-size: 12px !important;
      }

      nav .navitem a {
        color: rgba(255,255,255,0.45) !important;
        text-decoration: none !important;
        font-family: 'Syne', sans-serif !important;
        font-weight: 600 !important;
        font-size: 13px !important;
        padding: 6px 13px !important;
        border-radius: 8px !important;
        transition: color 0.18s, background 0.18s !important;
        background: transparent !important;
        display: block !important;
      }

      nav .navitem a:hover {
        color: #fff !important;
        background: rgba(255,255,255,0.08) !important;
      }

      nav .navitem a[selected] {
        color: #000 !important;
        background: #fff !important;
        font-weight: 700 !important;
        box-shadow: 0 0 18px rgba(255,255,255,0.2) !important;
      }

    </style>
  </head>
  <body theme="main">
    <canvas id="vd-bg-canvas"></canvas>
    <div id="vd-bg-grid"></div>
    <div id="vd-bg-vignette"></div>

    <nav>
      <div class="logo">
        <img src="./assets/images/icon.png" alt="Logo" draggable="false" />
        <h1>VirtualDesktopz</h1>
      </div>
      <p id="time"></p>
      <div class="navitems">
        <div class="navitem"><a href="/">Home</a></div>
        <div class="navitem"><a selected href="/gs.html">Games</a></div>
        <div class="navitem"><a href="/apps.html">Apps</a></div>
        <div class="navitem"><a href="/emulator.html">Emulator</a></div>
        <div class="navitem"><a href="/search.html">Search</a></div>
      </div>
    </nav>

    <h1>Games</h1>
    <input type="text" class="input" id="search" placeholder="Search Games" style="text-align: center" />
    <div class="cardgroup" id="favoritedgames"></div>
    <div class="cardgroup" id="gamecards"></div>
    <button class="secondary" onclick="clearcustomgames()">Clear custom games</button>

    <script src="./js/index.js"></script>
    <script src="./assets/data/games.js"></script>
    <script src="./js/games.js"></script>

    <script>
      const searchInput = document.querySelector('#search');
      const items = document.querySelectorAll('.card');
      searchInput.addEventListener('input', function(event) {
        const query = event.target.value.toLowerCase();
        items.forEach(function(item) {
          const title = item.querySelector('.card h4').textContent.toLowerCase();
          item.style.display = title.includes(query) ? 'block' : 'none';
        });
      });
    </script>

    <script type="text/javascript">
      aclib.runAutoTag({ zoneId: '6hmeyutild' });
    </script>

    <script>
    (function() {
      const canvas = document.getElementById('vd-bg-canvas');
      const ctx = canvas.getContext('2d');
      let W = canvas.width = window.innerWidth;
      let H = canvas.height = window.innerHeight;
      window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
      const particles = Array.from({ length: 60 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.4 + 0.3,
        dx: (Math.random() - 0.5) * 0.22, dy: (Math.random() - 0.5) * 0.22,
        alpha: Math.random() * 0.35 + 0.05
      }));
      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.alpha})`; ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0 || p.x > W) p.dx *= -1;
          if (p.y < 0 || p.y > H) p.dy *= -1;
        });
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 110) {
              ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(255,255,255,${0.07*(1-dist/110)})`; ctx.lineWidth = 0.7; ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();
    </script>
  </body>
</html>
