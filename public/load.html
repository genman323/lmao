<!DOCTYPE html>
<html>
  <head>
    <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png" />
    <title>VirtualDesktopz</title>
    <link rel="stylesheet" href="./css/master.css" />
    <script src="/uv/uv.bundle.js" charset="UTF-8"></script>
    <script src="/uv/uv.config.js"></script>
    <script src="./js/preload.js"></script>
    <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        background: #000 !important;
        color: #fff;
        font-family: 'Syne', sans-serif;
      }

      #vd-bg-canvas {
        position: fixed; inset: 0;
        width: 100%; height: 100%;
        z-index: 0; pointer-events: none; opacity: 0.4;
      }
      #vd-bg-grid {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background-image:
          linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 48px 48px;
      }
      #vd-bg-vignette {
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.85) 90%);
      }
      body > *:not(#vd-bg-canvas):not(#vd-bg-grid):not(#vd-bg-vignette) {
        position: relative; z-index: 1;
      }

      .gamecontainer {
        animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
        animation-delay: 0.1s;
      }

      .gamecontainer iframe {
        border: 1px solid rgba(255,255,255,0.08) !important;
        border-radius: 14px;
        box-shadow: 0 0 40px rgba(255,255,255,0.04), 0 20px 60px rgba(0,0,0,0.6);
      }

      #gameInfo {
        background: rgba(10,10,10,0.7) !important;
        border: 1px solid rgba(255,255,255,0.08) !important;
        border-radius: 14px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 20px !important;
      }

      .gameHeader {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 12px;
      }

      #gameImage {
        width: 52px;
        height: 52px;
        border-radius: 10px;
        object-fit: cover;
        border: 1px solid rgba(255,255,255,0.1);
      }

      #gameTitle {
        font-size: 18px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.01em;
      }

      #gameDescription {
        font-size: 13px;
        color: rgba(255,255,255,0.4);
        font-family: 'JetBrains Mono', monospace;
        line-height: 1.6;
        margin-bottom: 16px;
      }

      #menubtns {
        display: flex;
        gap: 10px;
      }

      #menubtns button {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.05);
        color: rgba(255,255,255,0.6);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
        font-size: 14px;
      }

      #menubtns button:hover {
        background: rgba(255,255,255,0.12);
        border-color: rgba(255,255,255,0.28);
        color: #fff;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body theme="main">
    <canvas id="vd-bg-canvas"></canvas>
    <div id="vd-bg-grid"></div>
    <div id="vd-bg-vignette"></div>

    <nav>
      <div class="logo">
        <img src="./assets/images/icon.png" alt="Logo" draggable="false" />
        <h1>VirtualDesktopz</h1>
      </div>
      <p id="time"></p>
      <div class="navitems">
        <div class="navitem"><a href="/">Home</a></div>
        <div class="navitem"><a href="/gs.html">Games</a></div>
        <div class="navitem"><a href="/apps.html">Apps</a></div>
        <div class="navitem"><a href="/emulator.html">Emulator</a></div>
        <div class="navitem"><a href="/search.html">Search</a></div>
      </div>
    </nav>

    <div class="gamecontainer">
      <iframe allowfullscreen frameborder="0" id="frame"></iframe>
      <div id="gameInfo">
        <div class="gameHeader">
          <img id="gameImage" alt="icon" />
          <h3 id="gameTitle"></h3>
        </div>
        <p id="gameDescription"></p>
        <div id="menubtns">
          <a href="./gs.html">
            <button onclick="window.location.href = '/'">
              <i class="fas fa-arrow-left"></i>
            </button>
          </a>
          <button onclick="document.querySelector('iframe').requestFullscreen()">
            <i class="fas fa-expand"></i>
          </button>
          <button onclick="favorite()">
            <i class="favorited far fa-star"></i>
          </button>
        </div>
      </div>
    </div>

    <script src="./js/index.js"></script>
    <script src="./assets/data/games.js"></script>
    <script src="./assets/data/apps.js"></script>
    <script src="./js/load.js"></script>

    <script type="text/javascript">
      aclib.runAutoTag({ zoneId: '6hmeyutild' });
    </script>

    <script>
    (function() {
      const canvas = document.getElementById('vd-bg-canvas');
      const ctx = canvas.getContext('2d');
      let W = canvas.width = window.innerWidth;
      let H = canvas.height = window.innerHeight;
      window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
      const particles = Array.from({ length: 60 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.4 + 0.3,
        dx: (Math.random() - 0.5) * 0.22, dy: (Math.random() - 0.5) * 0.22,
        alpha: Math.random() * 0.35 + 0.05
      }));
      function draw() {
        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${p.alpha})`; ctx.fill();
          p.x += p.dx; p.y += p.dy;
          if (p.x < 0 || p.x > W) p.dx *= -1;
          if (p.y < 0 || p.y > H) p.dy *= -1;
        });
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 110) {
              ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(255,255,255,${0.07*(1-dist/110)})`; ctx.lineWidth = 0.7; ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }
      draw();
    })();
    </script>
  </body>
</html>
